name: Build
on:
  push:
    tags: [ 'beta', 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. 1.0.1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        filter: blob:none

    - name: Get version name
      id: version
      run: |
        # Wenn manuell gestartet mit Version-Input
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        # Wenn per Tag gestartet (v1.0.1 → 1.0.1)
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        else
          # Automatisch letzten Release-Tag finden und +1
          LAST=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LAST" ]; then
            VERSION="1.0.0"
          else
            LAST="${LAST#v}"
            MAJOR=$(echo $LAST | cut -d. -f1)
            MINOR=$(echo $LAST | cut -d. -f2)
            PATCH=$(echo $LAST | cut -d. -f3)
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
        fi
        echo "version_name=${VERSION}" >> $GITHUB_OUTPUT
        echo "Using version: ${VERSION}"

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Rename APK
      id: apk
      run: |
        APK=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
        NEW_NAME="Xtra_for_AndroidTV_${{ steps.version.outputs.version_name }}.apk"
        cp "$APK" "app/build/outputs/apk/debug/$NEW_NAME"
        echo "apk_path=app/build/outputs/apk/debug/$NEW_NAME" >> $GITHUB_OUTPUT

    - name: Generate release notes
      run: git log --oneline -n 20 > notes.txt

    - name: Create prerelease
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "v${{ steps.version.outputs.version_name }}" \
          --title "Xtra for AndroidTV v${{ steps.version.outputs.version_name }}" \
          --notes-file notes.txt \
          --prerelease \
          "${{ steps.apk.outputs.apk_path }}"
